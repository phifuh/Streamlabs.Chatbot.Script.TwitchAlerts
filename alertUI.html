<script>

    function testTheZeldaBox(){

        showAndHideZeldaBox();
        createZeldaTextBox('Thanks for the Follow ', 'Username')

    }

    function changePositionZelda(pos) {

        if (pos == "Bot") {

            document.getElementById('dialogue-box').style = 'left:unset;right:0;top:unset;bot:0;width: 470px;';

        }
        else {

            document.getElementById('AlertUI').style = 'left:unset;right:0;top:unset;bot:0;width: 470px;';
            document.getElementById('follow').style = 'padding-left:unset';
        }

    }

    function recieveArray(dataArray) {

        splittIncomingEvent(dataArray)
    }

    function webSocketEvent(eventName, varList) {

        if (eventName === "Alerts_showFollowEvent") {

            updateFollow(varList.userName);
            reloadASingleIcon(0)
            showAndHideZeldaBox();
            createZeldaTextBox('Thanks for the Follow ', varList.userName)
            //displayFollowAlert();
        }

        else if (eventName === "Alerts_showSubEvent") {

            updateSub(varList.userName, varList.subAmount)
            reloadASingleIcon(1)
            showAndHideZeldaBox();
            createZeldaTextBox('Welcome to the Family @', varList.userName)
            //Gif animation video or  what ever. Currently Zelda txt box displaySubAlert();
        }

        else if (eventName === "Alerts_showHostEvent") {

            showAndHideZeldaBox();
            createZeldaTextBox('Thank you for the Host @', varList.userName)
        }

        else if (eventName === "Alerts_showRaidEvent") {

            showAndHideZeldaBox();
            createZeldaTextBox('Thank you for the Raid @', varList.userName)
        }

        else if (eventName === "Alerts_showBitEvent") {

            updateBits(varList.userName, varList.bitAmount)
            reloadASingleIcon(2)
            showAndHideZeldaBox();
            createZeldaTextBox('Thank you for the bits @', varList.userName)
        }

        else if (eventName === "Alerts_showDonationEvent") {

            updateDonation(varList.userName, varList.donationAmount);
            reloadASingleIcon(3)
            showAndHideZeldaBox();
            createZeldaTextBox('Thank you so much for the Donation ', varList.userName)
            //showDonation()
        }
        
        else if (eventName === "Alerts_Init") {

            initAlerts(varList.followName, varList.subName, varList.subAmount, varList.bitsName, varList.bitsAmount, varList.donationName, varList.donationAmount);
        }

        else if (eventName === "Alerts_ChangeUI_Position") {

            changeUIPosition(varList.newPosition)
        }

        else if (eventName === "updateGameIcons") {

            updateGameIcons(varList.currentGame)
        }     
    }

    function showAndHideZeldaBox() {

        document.getElementsByClassName("dialogue-box")[0].style.visibility = 'Visible';

        sleep(15000).then(() => {
            document.getElementsByClassName("dialogue-box")[0].style.visibility = 'Hidden';
        });
        
    }

    function changeUIPosition(newPosition) {

        if (newPosition == "BotRight") {
            document.getElementById('AlertUI').style = 'left:unset;right:0;top:unset;bot:0;width: 470px;';
            document.getElementById('follow').style = 'padding-left:unset';
        }
        else if (newPosition == "BotLeft") {
            document.getElementById('AlertUI').style = 'left:0;right:unset;top:unset;bot:0;width: 470px;';
            document.getElementById('follow').style = 'padding-left:unset';

        }
        else if (newPosition == "Top") {
            document.getElementById('AlertUI').style = 'left:unset;right:unset;bot:unset;top:0;width: unset;';
            document.getElementById('follow').style = 'padding-left:40px';

        }
        else if (newPosition == "TopLeft") {
            document.getElementById('AlertUI').style = 'left:0;right:unset;top:0;bot:unset;width: 470px;';
            document.getElementById('follow').style = 'padding-left:unset';

        }
        else if (newPosition == "Bot") {
            document.getElementById('AlertUI').style = 'left:unset;right:unset;bot:0;top:unset;width: unset;';
            document.getElementById('follow').style = 'padding-left:40px';
        }
        else {
            document.getElementById('AlertUI').style = 'left:unset;right:unset;bot:unset;top:0;width: unset;';
            document.getElementById('follow').style = 'padding-left:40px';
        }

    }

    function initAlerts(followName, subName, subAmount, bitsName, bitsAmount, donationName, donationAmount) {
        followNameSpan = document.getElementById('followName');
        followNameSpan.innerHTML = followName;

        subNameSpan = document.getElementById('subName');
        subNameSpan.innerHTML = subName + " " + subAmount + "x";

        bitsNameSpan = document.getElementById('bitsName');
        bitsNameSpan.innerHTML = + bitsAmount + " " + bitsName;

        donationNameSpan = document.getElementById('donationName');
        donationNameSpan.innerHTML = donationAmount + " " + donationName;
    }

    function updateFollow(followerUsername) {

        followNameSpan = document.getElementById('followName');
        followNameSpan.innerHTML = followerUsername;

    }

    function updateSub(subUsername, subAmount) {

        subNameSpan = document.getElementById('subName');
        subNameSpan.innerHTML = subUsername + " " + subAmount + "x";

    }

    function updateBits(bitUsername, bitAmount) {

        subNameSpan = document.getElementById('bitsName');
        subNameSpan.innerHTML = bitUsername + " " + bitAmount ;

    }

    function updateDonation(donationUserName, donationAmount) {

        followNameSpan = document.getElementById('donationName');
        followNameSpan.innerHTML = donationUserName + " " + donationAmount + "€";;

    }

    function showDonation() {

        /*
        <video id="donationVideo" autoplay width="1920" height="1035">
            <source src="video/Ring-Drop-Dono-Vid.webm" type="video/webm">
        </video>
        */

        videoFrame = document.getElementById('donationVideoFrame');
        var vidElemement = document.createElement("video");

        var sourceNew = document.createElement("source");
        sourceNew.type = "video/mp4";
        sourceNew.src = 'video/Ring-Drop-Dono-Vid.webm';
        sourceNew.autobuffer = true;

        vidElemement.id = "donationVideo";
        vidElemement.width = 1920;
        vidElemement.height = 1035;
        vidElemement.volume = 0;
        //vidElemement1.autoplay = true;

        videoFrame.appendChild(vidElemement);
        vidElemement.appendChild(sourceNew);

        var video = document.getElementById("donationVideo");
        video.playbackRate = 0.4;
        video.play();

        /*
        var AudioCoin = document.getElementById("slotDrop");
        sleep(4000).then(() => {

            AudioCoin.playbackRate = 0.8;
            AudioCoin.play();
            //AudioCoin.loop = true;
        });
        */
        //sleep(8000).then(() => {

        //    AudioCoin.loop = false;
        //});
    }

    function updateGameIcons(currentGame)
    {

        var eventName = ['followIcon', 'subIcon', 'bitsIcon', 'donationIcon'];
        var eventIcon = ['followIconAnimation', 'subIconAnimation', 'bitsIconAnimation', 'donationIconAnimation'];

        if (currentGame == 'Zelda Ocarania of time') {

            var videoFiles = ['shroom.webm', 'star.webm', 'boo.webm', 'coin.webm'];
        }

        else {

            var videoFiles = ['shroom.webm', 'star.webm', 'boo.webm', 'coin.webm'];
        }
        
        x = 0
        while(x < 4){

            document.getElementById(eventIcon[x]).remove();

            videoFrame = document.getElementById(eventName[x]);
            var vidElemementNew = document.createElement("video");

            var sourceNew = document.createElement("source");
            sourceNew.type = "video/mp4";
            sourceNew.src = 'video/' + videoFiles[x];
            sourceNew.autobuffer = true;

            vidElemementNew.id = eventIcon[x];
            vidElemementNew.width = 36;
            vidElemementNew.height = 36;
            vidElemementNew.volume = 0;

            videoFrame.appendChild(vidElemementNew);
            vidElemementNew.appendChild(sourceNew);

            playVideoAuto = document.getElementById(eventIcon[x]);
            playVideoAuto.play();

            x += 1
        }

    
        }

    function reloadASingleIcon(eventNumber) {

        var eventIcon = ['followIconAnimation', 'subIconAnimation', 'bitsIconAnimation', 'donationIconAnimation'];

        document.getElementById(eventIcon[eventNumber]).load();

    }
