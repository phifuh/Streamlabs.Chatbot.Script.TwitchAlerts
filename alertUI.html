        <script>


            function sleep(time) {
                return new Promise((resolve) => setTimeout(resolve, time));
            }

            function recieveArray(dataArray) {

                splittIncomingEvent(dataArray)
            }

            function webSocketEvent(eventName, varList) {

                if (eventName === "Alerts_showFollowEvent") {

                    sliceUsername(varList.userName);
                    updateFollow(varList.userName);
                    reloadASingleIcon(0)
                    toggleAlertBox("DefaultAlerts/shroom.png");
                    createZeldaTextBox('Thanks for the Follow ', varList.userName)
                    //displayFollowAlert();
                }

                else if (eventName === "Alerts_showSubEvent") {

                    sliceUsername(varList.userName);
                    updateSub(varList.userName, varList.subAmount)
                    reloadASingleIcon(1)
                    toggleAlertBox("DefaultAlerts/star.png");
                    createZeldaTextBox('Welcome to the Family @', varList.userName)
                    //Gif animation video or  what ever. Currently Zelda txt box displaySubAlert();
                }

                else if (eventName === "Alerts_showBitEvent") {

                    sliceUsername(varList.userName);
                    updateBits(varList.userName, varList.bitAmount)
                    reloadASingleIcon(2)
                    toggleAlertBox("DefaultAlerts/bits.png");
                    createZeldaTextBox('Thank you for the bits @', varList.userName)
                }

                else if (eventName === "Alerts_showDonationEvent") {

                    sliceUsername(varList.userName);
                    updateDonation(varList.userName, varList.donationAmount);
                    reloadASingleIcon(3)
                    toggleAlertBox("DefaultAlerts/coin.png");
                    createZeldaTextBox('Thank you very much for the Donation ', varList.userName)
                    //showDonation()
                }

                else if (eventName === "Alerts_showHostEvent") {

                    toggleAlertBox("DefaultAlerts/bits.png");
                    createZeldaTextBox('Thank you for the Host @', varList.userName)
                }

                else if (eventName === "Alerts_showRaidEvent") {

                    toggleAlertBox("DefaultAlerts/bits.png");
                    createZeldaTextBox('Thank you for the Raid @', varList.userName)
                }

                else if (eventName === "Alerts_Init") {

                    if (varList.followName.length > 18) {
                        varList.followName = varList.followName.slice(0, 18);
                    }

                    if (varList.subName.length > 18) {
                        varList.subName = varList.subName.slice(0, 18);
                    }

                    if (varList.bitsName.length > 18) {
                        varList.bitsName = varList.bitsName.slice(0, 18);
                    }

                    if (varList.donationName.length > 18) {
                        varList.donationName = varList.donationName.slice(0, 18);
                    }

                    initAlerts(varList.followName, varList.subName, varList.subAmount, varList.bitsName, varList.bitsAmount, varList.donationName, varList.donationAmount);
                }

                else if (eventName === "Alerts_changeUIDesign") {

                    changeUIDesign(varList.game)
                }

                else if (eventName === "Alerts_ChangeUI_Position") {

                    changeUIPosition(varList.newPosition)
                }

                else if (eventName === "Alerts_ToggleUI_Visibility") {

                    toggleUIvisibilit(varList.UIvisibility)
                }


                else if (eventName === "ChannelPoints_Redemption") {

                    toggleAlertBox(varList.imagePath);
                    createZeldaTextBox(varList.redemtionText)

                    if (varList.redemtionTitle == "Drink Water") {

                        var audio = document.getElementById('drinkWaterAudio');
                        audio.volume = 0.2;
                        audio.play();
                    }
                }

                else if (eventName === "updateGameIcons") {

                    updateGameIcons(varList.currentGame)
                }
            }

                if (pos == "Bot") {

                    document.getElementById('dialogue-box').style = 'left:unset;right:0;top:unset;bot:0;width: 470px;';
                }
                else {

                    document.getElementById('AlertUI').style = 'left:unset;right:0;top:unset;bot:0;width: 470px;';
                    document.getElementById('follow').style = 'padding-left:unset';
                }
            }

            function fadeInAndOutUIDisplay() {

                //if a new alert happens slide in

                document.getElementById('AlertUI').style.transition.delay = sleepArray[100];
                document.getElementById('AlertUI').style.transition = 'all ' + transitionTimeArray[5] + 's ease-in-out';
                document.getElementById('AlertUI').style.transform = 'translateY(360px)';

                //document.getElementById('AlertUI').style = 'height:' + heightArray[50] + 'px; width:' + widthtArray[50] + 'px;background-size: contain; background-repeat: no-repeat;float: left;';

                sleep(15000).then(() => {

                    document.getElementById('rang').style.transition = 'all 7s ease-in-out';
                    document.getElementById('rang').style.transform = 'translateY(-360px)';

                });

            function updateGameIcons(currentGame) {

                var eventName = ['followIcon', 'subIcon', 'bitsIcon', 'donationIcon'];
                var eventIcon = ['followIconAnimation', 'subIconAnimation', 'bitsIconAnimation', 'donationIconAnimation'];

                if (currentGame == 'Zelda Ocarania of time') {

                    var videoFiles = ['shroom.webm', 'star.webm', 'boo.webm', 'coin.webm'];
                }

                else {

                    var videoFiles = ['shroom.webm', 'star.webm', 'boo.webm', 'coin.webm'];
                }

                x = 0
                while (x < 4) {

                    document.getElementById(eventIcon[x]).remove();

                    videoFrame = document.getElementById(eventName[x]);
                    var vidElemementNew = document.createElement("video");

                    var sourceNew = document.createElement("source");
                    sourceNew.type = "video/mp4";
                    sourceNew.src = 'video/' + videoFiles[x];
                    sourceNew.autobuffer = true;

                    vidElemementNew.id = eventIcon[x];
                    vidElemementNew.width = 36;
                    vidElemementNew.height = 36;
                    vidElemementNew.volume = 0;

                    videoFrame.appendChild(vidElemementNew);
                    vidElemementNew.appendChild(sourceNew);

                    playVideoAuto = document.getElementById(eventIcon[x]);
                    playVideoAuto.play();

                    x += 1
                }


            }

            function reloadASingleIcon(eventNumber) {

                var eventIcon = ['followIconAnimation', 'subIconAnimation', 'bitsIconAnimation', 'donationIconAnimation'];

                document.getElementById(eventIcon[eventNumber]).load();

            }
